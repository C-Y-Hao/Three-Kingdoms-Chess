<!DOCTYPE html>
<html>
<head>
    <title>TKC</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f0f0; }
        
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /*background: #2d1e14 center/cover; /* 可替換背景圖 */
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            z-index: 999;
        }

        .auth-card {
            background: rgba(45, 30, 20, 0.95);
            padding: 40px;
            border: 2px solid #8b4513;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            width: 320px;
            text-align: center;
            color: #f5deb3;
        }

        .input-group { margin-bottom: 20px; text-align: left; }

        input {
            width: 100%;
            padding: 10px;
            background: #3e2723;
            border: 1px solid #5d4037;
            color: #fff;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .auth-button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            width: 49%;
        }
        
        

        .btn-login { background: #b71c1c; color: white; }
        .btn-reg { background: #455a64; color: white; }

        #auth-status { color: #ffeb3b; font-size: 14px; margin-top: 15px; }
        
        #main-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fdfaf2 center/cover;
            background-color: #fdfaf2;
            display: none; justify-content: center; align-items: center;
            z-index: 999;
        }
        
        .menu-card {
            width: 100vw;
            height: 100vh;
                
            /* 2. 移除圓角與邊距，確保貼齊邊緣 */
            border-radius: 0;
            margin: 0;
            border: none;
            background: #fdfaf2;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .menu-title {
            color: #d4af37;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 2px 2px 5px #000;
        }

        .menu-grid {
            display: flex;
            flex-direction: column; /* 垂直排列，也可以改為 row */
            gap: 15px;
            width: 250px;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .menu-btn {
            width: 100%;
            background: #d69046;
            color: #fdfaf2;
            border:none;
            padding: 20px 20px;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            font-weight: bold;
            width: 90%;
        }

        .menu-btn:hover {
            background: #6d4c41;
            transform: scale(1.05);
            border-color: #d4af37;
        }

        /* 特別強調開始按鈕 */
        .menu-btn.primary { background: #3d99c5; border-color: #05288b; }
        /* 特別強調登出按鈕 */
        .menu-btn.danger { background: #8b0000; border-color: #ff0000; margin-top: 10px; }

        .icon { margin-right: 10px; font-size: 1.2em; }

        #user-info-bar {
            margin-top: 25px;
            color: #aaa;
            font-size: 0.9em;
            border-top: 1px solid #5d4037;
            padding-top: 10px;
        }
        
        #recruit-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fdfaf2 center/cover;
            background-color: #fdfaf2;
            display: none; justify-content: center; align-items: center;
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        
        .recruit-card {
            background: #2d1e14; /* 深木色 */
            padding: 30px;
            border: 3px solid #d4af37;
            text-align: center;
            width: 80%;
            max-width: 500px;
        }

        .recruit-display {
            height: 200px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.5em;
        }
        
        h1 {
            /* 移除 position: absolute; top: 0; left: 20px; */
            display: inline-block;    /* 讓背景只包住文字寬度 */
            margin: 10px 0 0 20px;    /* 上外邊距10px，左外邊距20px */
            background: #8b4513;
            color: #fdfaf2;
            padding: 10px 20px;
            border-radius: 10px;      /* 四角圓角比較大器 */
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            font-size: 16px;
        }
        
        .main-container {
            display: flex;          /* 核心：讓子元素橫向排列 */
            justify-content: center; /* 居中對齊 */
            align-items: flex-start; /* 頂部對齊 */
            gap: 15px;              /* 元件之間的間距 */
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        
        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center; /* 讓回合數在地圖正上方置中 */
            gap: 0px;
        }

        #round-display {
            /* 與地圖寬度同步 (80vmin 且不超過 650px) */
            width: calc(80vmin + 10px); /* 10px 是地圖左右邊框 5px+5px 的總和 */
            max-width: 810px;          /* 650px + 10px 邊框 */
            
            background: #444;           /* 使用與地圖邊框 (#444) 一樣的顏色實現無縫 */
            color: #ffd700;             /* 金色文字 */
            text-align: center;
            padding: 8px 0;
            font-weight: bold;
            font-size: 1.2em;
            
            /* 圓角處理：上方圓角，下方直角 */
            border-radius: 10px 10px 0 0;
            border: 5px solid #444;     /* 與地圖邊框同色 */
            border-bottom: none;        /* 移除底部邊框，達成無縫連接 */
            
            box-sizing: border-box;
            letter-spacing: 5px;
        }
        
        #map {
            display: grid;
            /* 使用 10 個等寬列，每列佔總寬度的 1fr */
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            
            /* 設定地圖的最大尺寸，vmin 代表寬高之中較小那個值的百分比 */
            width: 80vmin;
            height: 80vmin;
            max-width: 800px; /* 限制最大不要超過原本的尺寸 */
            max-height: 800px;
            margin-top: 0;
            gap: 2px;
            background-color: #333;
            border: 5px solid #444;
            border-radius: 0 0 5px 5px;
            margin: 0 auto; /* 確保在容器中居中 */
        }

        .cell {
            /* 移除固定的 65px，讓它自動填滿 grid 空間 */
            width: 100%;
            height: 100%;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* 讓字體大小也隨縮放稍微改變 */
            font-size: 1.5vmin;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .status-fire {
            box-shadow: inset 0 0 12px #ff4d4d !important;
            background-color: #ffe6e6 !important;
        }
        /* 在灼燒格子內加入火焰小圖標 */
        .status-fire::after {
            content: "🔥";
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 14px;
        }

        /* 冰寒狀態：邊框發藍光，並帶有冷色調 */
        .status-ice {
            box-shadow: inset 0 0 12px #00d4ff !important;
            background-color: #e6faff !important;
        }
        /* 在冰寒格子內加入冰晶小圖標 */
        .status-ice::after {
            content: "❄️";
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 14px;
        }

        /* 閃避狀態：整體變白色（高亮度），並有一種虛幻感 */
        .status-evade {
            background-color: #ffffff !important;
            filter: brightness(1.2) contrast(0.8);
            border: 1px solid #ddd;
        }

        /* 側邊欄樣式 */
        #sidebar {
            width: 260px;
            /* 這裡的高度要加上地圖的 border (10px) 和 gap 影響，約略等於地圖高度 */
            height: calc(80vmin + 55px);
            max-height: 845px;
            
            background: #fdfaf2;
            border: 2px solid #8b4513;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 3px 3px 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }
        
        #sidebar::after {
            content: "";
            position: absolute;
            bottom: 15px; /* 稍微往上一點，避開圓角邊框 */
            left: 2px;
            right: 2px;
            height: 30px; /* 增加漸層高度，暗示效果更明顯 */
            background: linear-gradient(transparent, #fdfaf2);
            pointer-events: none;
            z-index: 10;
            border-radius: 0 0 10px 10px;
        }
        
        #side-info-container {
            flex: 1;                /* 自動填滿剩餘高度 */
            overflow-y: auto;       /* 超出高度時顯示捲軸 */
            margin-top: 10px;
            padding-right: 5px;
            padding-bottom: 20px;
            &::-webkit-scrollbar {
                display: none;
            }

            /* 隱藏捲軸 - 針對 Firefox */
            scrollbar-width: none;

            /* 隱藏捲軸 - 針對 IE/Edge */
            -ms-overflow-style: none;
        }
        
        #side-name {
            margin: 0;
            font-size: 1.5em;
            padding-bottom: 8px;
            border-bottom: 2px solid #8b4513;
            text-align: center;
            color: #333;
        }
        
        /* 右側邊欄基礎樣式 */
        #sidebar-right {
            width: 260px;
            height: calc(80vmin + 55px);
            max-height: 845px;
            
            background: #fdfaf2; /* 延續羊皮紙色 */
            border: 2px solid #8b4513; /* 延續棕色邊框 */
            border-radius: 10px;
            padding: 15px;
            /* 陰影往左偏 (-3px)，產生對稱感 */
            box-shadow: -3px 3px 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }

        /* 頂部標題：勢力概況 */
        #right-side-title {
            margin: 0;
            font-size: 1.5em;
            padding-bottom: 8px;
            border-bottom: 2px solid #8b4513;
            text-align: center;
            color: #333;
            font-weight: bold;
        }

        /* 右側內容容器 (金幣、繁榮度、羈絆列表) */
        #right-info-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
            padding-right: 5px;
            padding-bottom: 20px;
            
            /* 隱藏捲軸 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #right-info-container::-webkit-scrollbar {
            display: none;
        }

        /* 數值區塊樣式 (金幣、繁榮度) */
        .global-stat-item {
            background: rgba(139, 69, 19, 0.05);
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            border: 1px dashed #8b4513;
        }

        /* 羈絆列表專用樣式 */
        #bond-list-ui {
            margin-top: 15px;
        }

        .bond-item {
            background: #fff;
            border-left: 4px solid #e74c3c; /* 羈絆用紅色線條強調 */
            padding: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.05);
        }

        .option-btn { padding: 10px; margin: 5px; cursor: pointer; }
        
        /* 血條與士氣條基礎樣式 */
        .bar-container { width: 85%; height: 4px; background: #eee; margin: 2px auto; border-radius: 2px; }
        .hp-bar { height: 100%; background: #ff4444; transition: width 0.3s; }
        .mp-bar { height: 100%; background: #4444ff; transition: width 0.3s; }
        
        .hero-card {
            background: #fdfaf2;
            width: 320px;
            border: 4px double #8b4513;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: cardZoom 0.3s ease-out;
        }
        
        @keyframes cardZoom {
            from {transform: scale(0.8); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }
        
        .card-skill {
            background: #eee;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            text-align: left;
            border: 1px solid #ccc;
        }
        
        .card-footer {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        
        .card-btn {
            padding: 8px 25px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .confirm { background: #8b4513; color: white; }
        .cancel { background: #999; color: white; }
        .confirm:hover { background: #ff4444; }
        
        #result-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85); /* 深黑透明背景 */
            z-index: 999; /* 確保在最上層 */
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px); /* 背景模糊，增加質感 */
        }

        .result-content {
            background: #fdfaf2;
            padding: 40px 60px;
            border: 5px double #8b4513;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            max-width: 500px;
            animation: slideIn 0.8s ease-out;
        }


        .result-stats {
            margin: 20px 0;
            padding: 15px;
            background: #eee;
            border-radius: 10px;
            font-size: 1.1em;
        }

        .retry-btn {
            background: #8b4513;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .retry-btn:hover {
            background: #ff4444;
            transform: scale(1.05);
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        #fixed-game-guide {
            position: fixed;
            bottom: 20px;       /* 距離螢幕底部 */
            right: 20px;        /* 距離螢幕右側 */
            z-index: 9999;      /* 確保在所有選單、地圖之上 */
            
            /* 樣式設計：古風紙捲感 */
            background: #fdfaf2;
            color: #8b4513;
            padding: 10px 15px;
            border: 2px solid #8b4513;
            border-radius: 30px; /* 膠囊形狀 */
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.3);
            
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, background 0.2s;
        }

        #fixed-game-guide:hover {
            background: #eee5d8;
            transform: translateY(-3px); /* 懸浮往上飄一點 */
            box-shadow: 2px 6px 15px rgba(0,0,0,0.4);
        }

        .guide-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1 id="game-title">Three Kingdoms Chess</h1>
    <div id="auth-overlay">
        <div class="auth-card">
            <h2 id="form-title"></h2>
            
            <div class="input-group">
                <label>帳號</label>
                <input type="text" id="username" placeholder="輸入帳號...">
            </div>
            
            <div class="input-group">
                <label>密碼</label>
                <input type="password" id="password" placeholder="輸入密碼...">
            </div>

            <div class="button-cluster">
                <button class="auth-button btn-login" onclick="authAction('login')">登入</button>
                <button class="auth-button btn-reg" onclick="authAction('register')">註冊</button>
            </div>

            <p id="auth-status"></p>
        </div>
    </div>
    
    <div id="main-overlay" >
        <div class="menu-card">
            <h1 class="menu-title">選單</h1>
                
            <div class="menu-grid">
                <button class="menu-btn primary" onclick="gameControl('start')">
                    <span class="icon">⚔️</span> 進入遊戲
                </button>
                    
                <button class="menu-btn" onclick="gameControl('recruit')">
                    <span class="icon">📜</span> 招募
                </button>
                    
                <button class="menu-btn" onclick="gameControl('my_heroes')">
                    <span class="icon">👥</span> 查看將領
                </button>
                    
                <button class="menu-btn" onclick="gameControl('rank')">
                    <span class="icon">🏆</span> 排行榜
                </button>
                
                <button class="menu-btn danger" onclick="gameControl('logout')">
                    <span class="icon">🚪</span> 登出　　
                </button>
            </div>
                
            <div id="user-info-bar">
                名稱：<span id="display-username">---</span> |
                金錢：<span id="display-wealth">0</span>
            </div>
        </div>
    </div>
    
    <div id="recruit-overlay">
        <div class="recruit-card">
            <h2 class="menu-title">招募</h2>
            <div id="recruit-result" class="recruit-display">
            </div>
            
            <div class="menu-grid">
                <button class="menu-btn primary" onclick="Recruit(1)">招募一次</button>
                <button class="menu-btn primary" onclick="Recruit(10)">招募十次</button>
                <button class="menu-btn" onclick="closeRecruit()">返回</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="sidebar-right">
            <h2 id="right-side-title">勢力概況</h2>
            <div id="right-info-container">
                <div class="global-stat-item">
                    💰 財富值：<span id="stat-gold" style="color: #d4af37; font-weight: bold;">0</span>
                </div>
                <div class="global-stat-item">
                    📈 繁榮度：<span id="stat-prosperity" style="color: #27ae60; font-weight: bold;">0</span>
                </div>

                <div id="bond-list-ui">
                    <p style="margin: 5px 0; font-weight: bold; color: #8b4513;">🔗 當前羈絆：</p>
                    <div id="bond-content">
                        <span style="color: #999;">尚未達成任何羈絆</span>
                    </div>
                </div>
                <div id="controls" style="display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px;">
                    <h3 id="turn-info" style="text-align: center; color: #ff4444;">輪到：準備中</h3>
                    <div id="action-pad" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
                        <div></div>
                        <button class="option-btn" onclick="sendAction('W')">▲</button>
                        <div></div>
                    
                        <button class="option-btn" onclick="sendAction('A')">◀</button>
                        <button class="option-btn" onclick="sendAction('0')">Skip</button>
                        <button class="option-btn" onclick="sendAction('D')">▶</button>
                        
                        <div></div>
                        <button class="option-btn" onclick="sendAction('S')">▼</button>
                        <div></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="game-area">
            <div id="round-display">
                第 <span id="round-number">1</span> 回合
                <div id="warning-msg" style="display:none; font-size: 0.7em; color: #ff4444; background: rgba(0,0,0,0.2); margin-top: 5px; padding: 2px; border-radius: 3px;">
                    ⚠️ 剩餘 5 回合
                </div>
            </div>
            <div id="map"></div>
        </div>

        <div id="sidebar">

            <h2 id="side-name">選取武將</h2>
            <hr>
            <div id="side-info-container">
                <div id="side-info">
                    <p>部署階段：請點擊淡色區域放置武將。</p>
                </div>
                <div id="skill-info" style="margin-top: 15px; padding: 10px; background: #fffbe6; border: 1px dashed #ffe58f; border-radius: 5px; display: none;">
                    <b style="color: #b8860b;">【技能】</b> <span id="skill-name">無</span> <br>
                    <small id="skill-desc" style="color: #666;">尚未選取武將</small>
                </div>
            </div>
        </div>
        
    </div>

    <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10;"></div>

    <div id="menu" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:10px; z-index:11; text-align:center; min-width: 250px; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
        <button onclick="closeMenu()" style="position:absolute; top:5px; right:10px; border:none; background:none; cursor:pointer; font-size:24px; color:#999;">&times;</button>
        <h2 id="menu-title">選擇劇本</h2>
        <div id="options"></div>
    </div>
    
    <div id="result-screen" style="display: none;">
        <div class="result-content">
            <h1 id="result-status">戰鬥結束</h1>
            <div class="result-detail">
                <p>經過了 <span id="final-round">0</span> 回合的激戰</p>
                <h2 id="winner-name">獲得勝利</h2>
            </div>
            <div class="result-stats" id="stats-list">
                </div>
            <button class="retry-btn" onclick="location.reload()">重啟遊戲</button>
        </div>
    </div>
    
    <div id="hero-card-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
        <div class="hero-card">
            <h2 id="card-hero-name">武將姓名</h2>
            <div class="card-body">
                <p><strong>勢力：</strong><span id="card-faction">--</span></p>
                <p><strong>攻擊力：</strong><span id="card-attack">--</span></p>
                <p><strong>防禦力：</strong><span id="card-defense">--</span></p>
                <div class="card-skill">
                    <h4 id="card-skill-name">技能名稱</h4>
                    <p id="card-skill-desc">技能詳細描述...</p>
                </div>
            </div>
            <div class="card-footer">
                <button id="btn-confirm-select" class="card-btn confirm">選擇</button>
                <button onclick="closeHeroCard()" class="card-btn cancel">取消</button>
            </div>
        </div>
    </div>
    
    <a href="https://c-y-hao.github.io/Three-Kingdoms-Chess-guide/" target="_blank" id="fixed-game-guide">
        <span class="guide-icon">📜</span> 遊戲指南
    </a>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="TKC_Frontend.js"></script>
</body>
</html>
